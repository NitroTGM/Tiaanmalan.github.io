<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Us ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
  <span></span>
  <span></span>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic"></audio>

<div class="container">

    <h1>Hey love 💕</h1>
    <p class="subtitle">If you're here… it means I miss you a little extra today.</p>

    <!-- ❤️ HEART -->
    <div class="heart-container">
        <div class="loader" id="heartBtn"></div>
    </div>

    <p id="loveNote">Tap the heart ❤️</p>

    <!-- 🎵 MUSIC CONTROLS -->
    <div class="music-controls">
        <p id="songName">Playing: ...</p>
        <button id="nextSongBtn">⏭ Next song</button>
    </div>

    <!-- 🕒 COUNTDOWN -->
    <div class="countdown">
        <h3>Next time we see each other in:</h3>
        <h2 id="timer"></h2>
    </div>

    <!-- 📸 PHOTO FRAMES -->
    <h3>Our memories 📸</h3>

    <div class="photo-gallery">

        <div class="photo-frame">
            <img src="img1.jpg">
            <p>Our first memory ❤️</p>
        </div>

        <div class="photo-frame">
            <img src="img2.jpg">
            <p>You + me 💕</p>
        </div>

        <div class="photo-frame">
            <img src="img3.jpg">
            <p>That perfect day ✨</p>
        </div>

        <div class="photo-frame">
            <img src="img4.jpg">
            <p>Still my favorite 😭</p>
        </div>

        <div class="photo-frame">
            <img src="img5.jpg">
            <p>Forever us 💞</p>
        </div>
        
        <div class="photo-frame">
    <img src="img6.jpg">
    <p>My ALL 💕</p>
</div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
