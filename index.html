
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Us ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="mainText">Hey love 💕</h1>
        <p id="subText">If you're here... I probably miss you a lot.</p>

        <button id="revealBtn">Tap me 💌</button>

        <div id="hiddenMessage" class="hidden">
            <p>You mean everything to me. No matter where we are ❤️</p>
        </div>

        <div class="counter">
            <p>I missed you this many times:</p>
            <h2 id="count">0</h2>
            <button id="countBtn">+1 🥺</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
