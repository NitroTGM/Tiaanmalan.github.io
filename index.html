<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Us ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌌 ANIMATED BACKGROUND -->
<div class="background">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">

    <button id="darkModeToggle">🌙</button>

    <h1>Hey love 💕</h1>
    <p>If you're here... I miss you.</p>

    <!-- 🎵 MUSIC -->
    <audio id="bgMusic" autoplay loop>
        <source src="song.mp3" type="audio/mp3">
    </audio>

    <!-- ❤️ HEART -->
    <div class="heart-container">
        <div class="loader" id="heartBtn"></div>
    </div>

    <p id="loveNote">Tap the heart ❤️</p>

    <!-- 🕒 COUNTDOWN -->
    <div class="countdown">
        <h3>Next time we see each other in:</h3>
        <h2 id="timer"></h2>
    </div>

    <!-- 📸 GALLERY -->
    <h3>Our memories 📸</h3>
    <div class="gallery">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
