<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Us ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌌 BACKGROUND -->
<div class="background">
  <span></span><span></span>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mp3">
</audio>

<div class="container">

    <h1>Hey love 💕</h1>
    <p class="subtitle">If you're here… it means I miss you a little extra today.</p>

    <!-- ❤️ HEART -->
    <div class="heart-container">
        <div class="loader" id="heartBtn"></div>
    </div>

    <p id="loveNote">Tap the heart ❤️</p>

    <!-- 🕒 COUNTDOWN -->
    <div class="countdown">
        <h3>Next time we see each other in:</h3>
        <h2 id="timer"></h2>
    </div>

    <!-- 📸 GALLERY -->
    <h3>Our memories 📸</h3>
    <div class="gallery">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
    </div>

    <!-- 🎬 VIDEOS -->
    <h3>Our moments 🎥</h3>

    <div class="video-gallery">
        <video class="videoPlayer" controls>
            <source src="video1.mp4" type="video/mp4">
        </video>

        <video class="videoPlayer" controls>
            <source src="video2.mp4" type="video/mp4">
        </video>

        <video class="videoPlayer" controls>
            <source src="video3.mp4" type="video/mp4">
        </video>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
