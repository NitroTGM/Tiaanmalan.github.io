<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Us 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌸 BACKGROUND -->
<div class="bg-back"></div>
<div class="bg-overlay"></div>
<div class="bg-front"></div>

<!-- 🎵 AUDIO -->
<audio id="bg-music" loop></audio>

<div class="container">

    <h1>Hey love 💕</h1>
    <p class="subtitle">If you're here... it means I miss you a little extra today.</p>

    <!-- 💖 HEART -->
    <div id="heart"></div>
    <p id="message">Tap the heart ❤️</p>

    <!-- 🎧 SONG -->
    <p id="song-name">Playing: Our Song ❤️</p>

    <div class="music-player">
        <div class="song-controls"></div>
    </div>

</div>

<!-- 📸 GALLERY -->
<div class="gallery">

    <div class="polaroid"><img src="img1.jpg"><p>Our first memory ❤️</p></div>
    <div class="polaroid"><img src="img2.jpg"><p>You + me 💞</p></div>
    <div class="polaroid"><img src="img3.jpg"><p>That perfect day ✨</p></div>
    <div class="polaroid"><img src="img4.jpg"><p>Still my favorite 🥹</p></div>
    <div class="polaroid"><img src="img5.jpg"><p>Forever us 💕</p></div>
    <div class="polaroid"><img src="img6.jpg"><p>My ALLES 💖</p></div>

</div>

<script src="script.js"></script>
</body>
</html>
