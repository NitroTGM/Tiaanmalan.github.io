<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
      color: white;
      padding: 40px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      max-width: 500px;
      margin: auto;
    }

    img {
      width: 220px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .btn {
      margin-top: 30px;
      padding: 12px 20px;
      background: #ff4d6d;
      border: none;
      border-radius: 25px;
      color: white;
      font-size: 1em;
      cursor: pointer;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 1.2em;
      color: #ffccd5;
    }
  </style>
</head>

<body>

  <h1>Hey you ❤️</h1>

  <p>
    If you’re seeing this… it means you tapped something I made just for you.
  </p>

  <img src="https://via.placeholder.com/220" alt="us">

  <p>
    Every moment with you feels like something I never want to end.
  </p>

  <button class="btn" onclick="revealMessage()">Tap me 💌</button>

  <div id="message" class="hidden">
    I love you more than I probably say… and I’d choose you every single time.
  </div>

  <br><br>

  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/track/3AJwUDP919kvQ9QcozQPxg"
    width="300" height="80" frameborder="0"
    allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>

  <script>
    function revealMessage() {
      document.getElementById("message").style.display = "block";
    }
  </script>

</body>
</html>
